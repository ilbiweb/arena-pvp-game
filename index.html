<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena PvP - Snake Battle</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Solana Web3 -->
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <!-- Phantom Wallet Adapter -->
    <script src="https://unpkg.com/@solana/wallet-adapter-phantom@0.18.2/lib/index.iife.js"></script>
    <!-- Anchor JS -->
    <script src="https://unpkg.com/@project-serum/anchor@0.30.1/dist/index.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header con wallet -->
        <div class="header">
            <h1>🐍 ARENA PVP - SNAKE BATTLE</h1>
            <button id="walletButton" class="wallet-btn">Conectar Phantom</button>
        </div>

        <!-- Estado de conexión -->
        <div id="walletStatus" class="status-card">
            <span id="walletAddress">No conectado</span>
            <span id="walletBalance">0 SOL</span>
        </div>

        <!-- Panel de juego -->
        <div class="game-panel">
            <!-- Canvas del juego Snake -->
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            
            <!-- Panel de información -->
            <div class="info-panel">
                <div class="score-board">
                    <h3>Puntuación</h3>
                    <div id="score">0</div>
                </div>
                <div class="game-status">
                    <h3>Estado</h3>
                    <div id="gameStatus">Esperando conexión...</div>
                </div>
            </div>
        </div>

        <!-- Panel de salas PvP -->
        <div class="lobby-panel">
            <h2>🏟️ ARENA DE COMBATE</h2>
            
            <!-- Crear sala -->
            <div class="create-room">
                <h3>Crear nueva sala</h3>
                <input type="number" id="stakeAmount" placeholder="Apuesta (SOL)" value="0.1" step="0.1" min="0.1">
                <button id="createGameBtn" class="action-btn">🎮 Crear Sala</button>
            </div>

            <!-- Salas activas -->
            <div class="rooms-list">
                <h3>Salas disponibles</h3>
                <div id="roomsContainer" class="rooms-container">
                    <div class="loading">Cargando salas...</div>
                </div>
            </div>

            <!-- Sala actual del jugador -->
            <div id="myGameContainer" class="my-game" style="display:none;">
                <h3>Tu sala actual</h3>
                <div id="myGameInfo"></div>
                <button id="startGameBtn" class="action-btn" style="display:none;">▶️ Iniciar Partida</button>
                <button id="claimPrizeBtn" class="action-btn" style="display:none;">💰 Reclamar Premio</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
